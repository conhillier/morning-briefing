name: Morning Briefing

on:
  schedule:
    # Target: briefing in hand by 5:00 AM BST.
    # GitHub Actions cron jobs can run 1-3 hours late, so we schedule early.
    # 2:00 UTC = 3:00 BST — with typical delays, arrives by 4:30-5:00 BST.
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    # Grounded pipeline: ~8 article fetches (Jina Reader) + 3 Claude calls
    # (selector, drafter, verifier) + Telegraph + ntfy. 15 min is comfortable.
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run morning briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: "con-hillier-morning-briefing"
        run: python briefing.py

      - name: Commit dedup + Pages HTML
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f last_briefing.json ]; then
            git add last_briefing.json
          fi
          if [ -d docs ]; then
            git add docs
          fi
          git diff --cached --quiet || git commit -m "Update briefing pages + dedup [skip ci]"
          git push
